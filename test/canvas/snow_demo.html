<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snow Animation Demo</title>
<style>
  body { margin: 0; background: #1c2030; display: flex; flex-direction: column;
         align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #ccc; }
  canvas { border: 1px solid #444; }
  .controls { margin-top: 12px; display: flex; gap: 20px; align-items: center; font-size: 13px; }
  label { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  input[type=range] { width: 100px; }
</style>
</head>
<body>
<div style="font-size:14px;color:#aaa;margin-bottom:8px">Snow — 6-armed snowflakes with sinusoidal sway</div>
<canvas id="cv" width="700" height="500"></canvas>
<div class="controls">
  <label>Count <input type="range" id="count" min="50" max="600" value="220" step="10">
    <span id="countVal">220</span></label>
  <label>Wind ← → <input type="range" id="wind" min="-0.06" max="0.06" value="0.02" step="0.005">
    <span id="windVal">0.020</span></label>
  <label>Sway amp <input type="range" id="sway" min="0" max="50" value="18" step="1">
    <span id="swayVal">18</span></label>
  <label>Fall speed <input type="range" id="speed" min="0.02" max="0.2" value="0.08" step="0.005">
    <span id="speedVal">0.08</span></label>
  <label>Flake size <input type="range" id="radius" min="1" max="10" value="2.5" step="0.5">
    <span id="radiusVal">2.5</span></label>
</div>

<script src="WeatherParticles.js"></script>
<script>
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W   = cv.width, H = cv.height;

let snow = new SnowSystem({
  worldWidth: W, worldHeight: H,
  count: 220, fallSpeed: 0.08, windU: 0.02,
  swayAmplitude: 18, swayPeriod: 4000,
  minRadius: 2, maxRadius: 5,
});

function bind(id, valId, update) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => {
    if (vl) vl.textContent = (+el.value).toFixed(3).replace(/\.?0+$/, '');
    update(+el.value);
  });
}

bind('count',  'countVal',  v => snow.count         = v);
bind('wind',   'windVal',   v => snow.windU          = v);
bind('sway',   'swayVal',   v => snow.swayAmplitude  = v);
bind('speed',  'speedVal',  v => snow.fallSpeed      = v);
bind('radius', 'radiusVal', v => { snow.minRadius = v * 0.6; snow.maxRadius = v * 1.4; });

function frame(t) {
  // Gradient sky background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1c2030');
  grad.addColorStop(1, '#2a3040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  snow.draw(ctx, { x: 0, y: 0, width: W, height: H }, t);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
